<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>聯絡我 — 我的故事</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;700;800&family=Noto+Sans+TC:wght@300;400;500&family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
.contact-hero{min-height:80vh;display:flex;flex-direction:column;justify-content:center;padding:100px 48px 60px;max-width:1000px;margin:0 auto;position:relative;}
.hero-blob{position:absolute;top:-100px;right:-100px;width:600px;height:600px;background:var(--y2024);border-radius:50%;filter:blur(140px);opacity:.06;pointer-events:none;}
.contact-links{display:flex;flex-direction:column;gap:16px;margin-top:40px;}
.contact-link-card{display:flex;align-items:center;gap:20px;padding:20px 24px;background:#ffffff;border:0.5px solid rgba(0,0,0,0.08);border-radius:10px;text-decoration:none;color:#1a1a18;transition:all .3s;}
.contact-link-card:hover{transform:translateX(6px);border-color:var(--y2024);}
.contact-link-icon{font-size:22px;flex-shrink:0;}
.contact-link-label{font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:#888884;margin-bottom:4px;}
.contact-link-val{font-size:15px;font-weight:500;}
</style>
</head>
<body>
<nav class="site-nav">
  <a href="index.html" class="site-nav-back"><span class="arrow">←</span> 回到故事</a>
  <span class="site-nav-title">我的故事</span>
  <span class="site-nav-year" style="color:var(--y2024);border-color:color-mix(in srgb,var(--y2024) 40%,transparent);background:color-mix(in srgb,var(--y2024) 10%,transparent)">現在</span>
</nav>
<div class="contact-hero">
  <div class="hero-blob"></div>
  <div class="page-hero-eyebrow">下一章 · 進行式</div>
  <h1 class="page-hero-title" style="color:var(--y2024);font-size:clamp(48px,8vw,96px)">讓我們<br>聊聊。</h1>
  <p class="page-hero-sub" style="max-width:480px;">6年的故事，講完了。如果你覺得這些能力和你的舞台有交集，我很樂意繼續這個對話。</p>
  <div class="contact-links">
    <a href="mailto:tank571 (Line ID)" class="contact-link-card">
      <div class="contact-link-icon">✉️</div>
      <div><div class="contact-link-label">Email</div><div class="contact-link-val">tank571 (Line ID)</div></div>
    </a>
    <a href="https://linkedin.com/in/tankliao" class="contact-link-card">
      <div class="contact-link-icon">💼</div>
      <div><div class="contact-link-label">LinkedIn</div><div class="contact-link-val">linkedin.com/in/tankliao</div></div>
    </a>
    <a href="tel:+886912345678" class="contact-link-card">
      <div class="contact-link-icon">📱</div>
      <div><div class="contact-link-label">電話</div><div class="contact-link-val">請來信或加 Line 聯絡</div></div>
    </a>
  </div>
</div>
<script>
const obs = new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); } });
}, { threshold: 0.1 });
document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
</script>
</body>
</html>
